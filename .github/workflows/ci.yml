name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: install
        id: install
        run: |
          set +e
          npm ci
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit $code
        continue-on-error: true

      - name: lint
        id: lint
        if: steps.install.outcome == 'success'
        run: |
          set +e
          npm run lint
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit $code
        continue-on-error: true

      - name: test
        id: test
        if: steps.install.outcome == 'success'
        run: |
          set +e
          mkdir -p .artifacts
          npm test -- --reporter=default --reporter=json --outputFile=.artifacts/vitest-results.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit $code
        continue-on-error: true

      - name: flaky-test summary
        id: flaky_summary
        if: steps.install.outcome == 'success'
        run: |
          set +e
          npm run ci:flaky-summary -- \
            --input .artifacts/vitest-results.json \
            --md .artifacts/flaky-test-summary.md \
            --json .artifacts/flaky-test-summary.json \
            --top 15
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit $code
        continue-on-error: true

      - name: ingest
        id: ingest
        if: steps.install.outcome == 'success'
        run: |
          set +e
          npm run ingest
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit $code
        continue-on-error: true

      - name: build
        id: build
        if: steps.install.outcome == 'success'
        run: |
          set +e
          npm run build
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit $code
        continue-on-error: true

      - name: docs changelog snapshot
        id: docs_changelog
        if: steps.install.outcome == 'success'
        run: |
          set +e
          npm run docs-changelog -- \
            --out .artifacts/docs-changelog.txt \
            --json .artifacts/docs-changelog.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit $code
        continue-on-error: true

      - name: cache audit
        id: cache_audit
        if: steps.install.outcome == 'success'
        run: |
          set +e
          mkdir -p .artifacts
          npm run audit-cache 2>&1 | tee .artifacts/cache-audit.txt
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit $code
        continue-on-error: true

      - name: source freshness
        id: source_freshness
        if: steps.install.outcome == 'success'
        run: |
          set +e
          mkdir -p .artifacts
          npm run source-freshness -- --as-of 2026-02-27T00:00:00.000Z --max-age-days 30 | tee .artifacts/source-freshness.txt
          code=${PIPESTATUS[0]}
          stale_count="$(awk '/^STALE_TARGETS / { print $2 }' .artifacts/source-freshness.txt)"
          if [ -n "$stale_count" ] && [ "$stale_count" -gt 0 ]; then
            echo "::warning::source-freshness detected $stale_count stale target(s); build remains non-blocking by policy."
          fi
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit $code
        continue-on-error: true

      - name: validate
        id: validate
        if: steps.install.outcome == 'success'
        run: |
          set +e
          npm run validate
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit $code
        continue-on-error: true

      - name: generate summary
        if: always()
        run: |
          STATUS_INSTALL="${{ steps.install.outcome }}"
          STATUS_LINT="${{ steps.lint.outcome }}"
          STATUS_TEST="${{ steps.test.outcome }}"
          STATUS_FLAKY_SUMMARY="${{ steps.flaky_summary.outcome }}"
          STATUS_INGEST="${{ steps.ingest.outcome }}"
          STATUS_BUILD="${{ steps.build.outcome }}"
          STATUS_DOCS_CHANGELOG="${{ steps.docs_changelog.outcome }}"
          STATUS_CACHE_AUDIT="${{ steps.cache_audit.outcome }}"
          STATUS_SOURCE_FRESHNESS="${{ steps.source_freshness.outcome }}"
          STATUS_VALIDATE="${{ steps.validate.outcome }}"

          EXIT_INSTALL="${{ steps.install.outputs.exit_code }}"
          EXIT_LINT="${{ steps.lint.outputs.exit_code }}"
          EXIT_TEST="${{ steps.test.outputs.exit_code }}"
          EXIT_FLAKY_SUMMARY="${{ steps.flaky_summary.outputs.exit_code }}"
          EXIT_INGEST="${{ steps.ingest.outputs.exit_code }}"
          EXIT_BUILD="${{ steps.build.outputs.exit_code }}"
          EXIT_DOCS_CHANGELOG="${{ steps.docs_changelog.outputs.exit_code }}"
          EXIT_CACHE_AUDIT="${{ steps.cache_audit.outputs.exit_code }}"
          EXIT_SOURCE_FRESHNESS="${{ steps.source_freshness.outputs.exit_code }}"
          EXIT_VALIDATE="${{ steps.validate.outputs.exit_code }}"

          [ -z "$EXIT_INSTALL" ] && EXIT_INSTALL="n/a"
          [ -z "$EXIT_LINT" ] && EXIT_LINT="n/a"
          [ -z "$EXIT_TEST" ] && EXIT_TEST="n/a"
          [ -z "$EXIT_FLAKY_SUMMARY" ] && EXIT_FLAKY_SUMMARY="n/a"
          [ -z "$EXIT_INGEST" ] && EXIT_INGEST="n/a"
          [ -z "$EXIT_BUILD" ] && EXIT_BUILD="n/a"
          [ -z "$EXIT_DOCS_CHANGELOG" ] && EXIT_DOCS_CHANGELOG="n/a"
          [ -z "$EXIT_CACHE_AUDIT" ] && EXIT_CACHE_AUDIT="n/a"
          [ -z "$EXIT_SOURCE_FRESHNESS" ] && EXIT_SOURCE_FRESHNESS="n/a"
          [ -z "$EXIT_VALIDATE" ] && EXIT_VALIDATE="n/a"

          icon() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              skipped) echo "⏭" ;;
              cancelled) echo "⏹" ;;
              *) echo "❔" ;;
            esac
          }

          SUMMARY_FILE="ci-summary.md"
          {
            echo "# CI Run Summary"
            echo ""
            echo "| Step | Command | Status | Exit code |"
            echo "|------|---------|--------|-----------|"
            echo "| install  | \`npm ci\` | $(icon "$STATUS_INSTALL") $STATUS_INSTALL | $EXIT_INSTALL |"
            echo "| lint     | \`npm run lint\` | $(icon "$STATUS_LINT") $STATUS_LINT | $EXIT_LINT |"
            echo "| test     | \`npm test\` | $(icon "$STATUS_TEST") $STATUS_TEST | $EXIT_TEST |"
            echo "| flaky-summary | \`npm run ci:flaky-summary\` | $(icon "$STATUS_FLAKY_SUMMARY") $STATUS_FLAKY_SUMMARY | $EXIT_FLAKY_SUMMARY |"
            echo "| ingest   | \`npm run ingest\` | $(icon "$STATUS_INGEST") $STATUS_INGEST | $EXIT_INGEST |"
            echo "| build    | \`npm run build\` | $(icon "$STATUS_BUILD") $STATUS_BUILD | $EXIT_BUILD |"
            echo "| docs-changelog | \`npm run docs-changelog\` | $(icon "$STATUS_DOCS_CHANGELOG") $STATUS_DOCS_CHANGELOG | $EXIT_DOCS_CHANGELOG |"
            echo "| cache-audit | \`npm run audit-cache\` | $(icon "$STATUS_CACHE_AUDIT") $STATUS_CACHE_AUDIT | $EXIT_CACHE_AUDIT |"
            echo "| source-freshness | \`npm run source-freshness -- --as-of 2026-02-27T00:00:00.000Z --max-age-days 30\` | $(icon "$STATUS_SOURCE_FRESHNESS") $STATUS_SOURCE_FRESHNESS | $EXIT_SOURCE_FRESHNESS |"
            echo "| validate | \`npm run validate\` | $(icon "$STATUS_VALIDATE") $STATUS_VALIDATE | $EXIT_VALIDATE |"
            echo ""
            if [ "$STATUS_INSTALL" = "failure" ] || [ "$STATUS_LINT" = "failure" ] || [ "$STATUS_TEST" = "failure" ] || \
               [ "$STATUS_FLAKY_SUMMARY" = "failure" ] || \
               [ "$STATUS_INGEST" = "failure" ] || [ "$STATUS_BUILD" = "failure" ] || \
               [ "$STATUS_DOCS_CHANGELOG" = "failure" ] || \
               [ "$STATUS_CACHE_AUDIT" = "failure" ] || \
               [ "$STATUS_SOURCE_FRESHNESS" = "failure" ] || \
               [ "$STATUS_VALIDATE" = "failure" ]; then
              echo "## Remediation Hints"
              echo ""
              [ "$STATUS_INSTALL"  = "failure" ] && echo "- **install failed**: run \`npm ci\` locally; check your Node.js version and network access."
              [ "$STATUS_LINT"     = "failure" ] && echo "- **lint failed**: run \`npm run lint\` locally and fix TypeScript errors."
              [ "$STATUS_TEST"     = "failure" ] && echo "- **test failed**: run \`npm test\` locally; check for regressions in parsers, normalization, or SVG output."
              [ "$STATUS_FLAKY_SUMMARY" = "failure" ] && echo "- **flaky-summary failed**: run \`npm run ci:flaky-summary -- --input .artifacts/vitest-results.json\` and verify vitest JSON is present."
              [ "$STATUS_INGEST"   = "failure" ] && echo "- **ingest failed**: run \`npm run ingest\` locally; verify cached HTML under \`data/sources/\` is present (\`npm run audit-cache\`)."
              [ "$STATUS_BUILD"    = "failure" ] && echo "- **build failed**: run \`npm run build\` locally; check docs/SVG generator errors."
              [ "$STATUS_DOCS_CHANGELOG" = "failure" ] && echo "- **docs-changelog failed**: run \`npm run docs-changelog\` locally and verify docs outputs exist after \`npm run build\`."
              [ "$STATUS_CACHE_AUDIT" = "failure" ] && echo "- **cache-audit failed**: run \`npm run audit-cache\` locally and restore missing/corrupt entries under \`data/sources/\`."
              [ "$STATUS_SOURCE_FRESHNESS" = "failure" ] && echo "- **source-freshness failed**: run \`npm run source-freshness -- --as-of 2026-02-27T00:00:00.000Z --max-age-days 30\` locally and inspect freshness output."
              [ "$STATUS_VALIDATE" = "failure" ] && echo "- **validate failed**: run \`npm run validate\` locally; check \`chords.schema.json\` compliance and provenance."
            fi
          } > "$SUMMARY_FILE"

          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"

      - name: upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary
          path: ci-summary.md
          retention-days: 7

      - name: upload flaky summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-test-summary
          path: |
            .artifacts/flaky-test-summary.md
            .artifacts/flaky-test-summary.json
          if-no-files-found: warn
          retention-days: 7

      - name: upload docs changelog artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-changelog-snapshot
          path: |
            .artifacts/docs-changelog.txt
            .artifacts/docs-changelog.json
          if-no-files-found: warn
          retention-days: 7

      - name: upload cache health artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cache-health
          path: |
            .artifacts/cache-audit.txt
            .artifacts/source-freshness.txt
          if-no-files-found: warn
          retention-days: 7

      - name: upload coverage report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: data/coverage-report.json
          if-no-files-found: warn
          retention-days: 7

      - name: fail if any step failed
        if: |
          steps.install.outcome == 'failure' ||
          steps.lint.outcome == 'failure' ||
          steps.test.outcome == 'failure' ||
          steps.flaky_summary.outcome == 'failure' ||
          steps.ingest.outcome == 'failure' ||
          steps.build.outcome == 'failure' ||
          steps.docs_changelog.outcome == 'failure' ||
          steps.cache_audit.outcome == 'failure' ||
          steps.source_freshness.outcome == 'failure' ||
          steps.validate.outcome == 'failure'
        run: |
          echo "One or more CI steps failed. See ci-summary.md artifact for details."
          exit 1

  website:
    name: website
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: install
        run: npm ci

      - name: build site
        run: npm run build

      - name: check links
        run: npm run check-links

      - name: bundle deterministic site artifact
        run: |
          mkdir -p .artifacts
          tar \
            --sort=name \
            --mtime='UTC 1970-01-01' \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            -cf .artifacts/site.tar site

      - name: upload site bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-bundle
          path: .artifacts/site.tar
          retention-days: 7

      - name: upload pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy_pages:
    name: deploy-pages
    needs: website
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: deploy to github pages
        id: deployment
        uses: actions/deploy-pages@v4
